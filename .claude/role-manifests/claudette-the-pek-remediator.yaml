    - repos
  allowed_paths:
    - "_grand_repo/docs/PEK*"
    - "_grand_repo/docs/pek/**"
    - "_grand_repo/.governance/**"
    - "repos/**/.claude/skills/asae/**"
    - "repos/**/docs/pek/**"
    - "repos/**/.git/hooks/**"
    - "repos/**/scripts/asae/**"
  forbidden_paths:
    - "**/src/**"
    - "**/plugin/**"
    - "**/docs/pitch/**"
    - "**/docs/valuation/**"
    - "**/.env*"
  allowed_operations:
    - commit
    - push
    - branch_create
    - edit_pek_doc
    - edit_asae_enforcement_mechanism
    - edit_hook_rule
    - edit_governance_rule
  forbidden_operations:
    - merge_to_master_without_review
    - force_push
    - secrets_handling
    - methodology_ip_rewrite_outside_enforcement_scope
  authority_caveats:
