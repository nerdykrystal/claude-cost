handoff:
  hands_off_to:
    - persona: claudette-the-code-debugger
      when: "PEK gap closure requires non-trivial code remediation in a submodule"
      via: session_handoff doc
    - persona: clauda-the-value-genius
      when: "gap is methodology-spec-shaped, not enforcement-shaped"
      via: session_handoff doc
  receives_from:
