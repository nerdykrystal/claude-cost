    - persona: clauda-the-value-genius
      when: "methodology authoring surfaces enforcement gap"
      via: session_handoff doc

session_chain_provenance:
  established: 2026-04-20
  established_by_session: null
  lineage_notes: "Persona crystallized when PEK doc became the SSOT for gap tracking; remediator role split from generic Claudette."

mast_alignment:
  closes_modes:
    - FM-1.2
  reduces_risk_for:
    - FM-2.1
    - FM-2.2
    - FM-4.2

honest_gaps:
  - "scope_bounds enforcement is presence-and-resolution-only at hook v05; deep semantic enforcement is v06 deferred"
  - "no automated linkage yet between PEK doc rows and manifest-sync"
