audit_threshold: strict-5  # canonical SSOT policy; this persona dogfoods the gate it stewards

scope_bounds:
  allowed_repos:
    - mm-claude-canonical
    - mm-fm-taxonomy   # docs/ ONLY (aspect-reference deliverable for bobotax); db/ is forbidden
  allowed_paths:
    - "mm-claude-canonical/skills/asae/**"
    - "**/skills/asae/SKILL.md"                 # cross-repo /asae spec propagation
    - "mm-claude-canonical/hooks/commit-msg-*"  # hook authoring (v10+)
    - "**/.githooks/commit-msg"                 # propagation TARGET writes (file-copy from canonical only)
    - "**/.asae-policy"                         # policy companion to hook propagation
    - "mm-claude-canonical/scripts/validators/asae-*.py"
    - "mm-claude-canonical/scripts/lib/*.sh"
    - "mm-claude-canonical/references/ASAE_Gate_Quickstart_*"
    - "mm-claude-canonical/references/Cross_Architectural_Rater_Patterns_*"
    - "mm-claude-canonical/references/anti-fabrication.md"   # to-author (Phase 5)
    - "mm-claude-canonical/docs/Role_Definition_Claudalisse_W_Convergence_Genius_*"
    - "mm-claude-canonical/role-manifests/claudalisse-convergence-genius.yaml"
    - "mm-claude-canonical/.claude/skills/role-definition-convergence-genius/**"
    - "mm-claude-canonical/scripts/propagate-role-skill-convergence-genius.sh"
    - "mm-claude-canonical/deprecated/asae-logs/gate-*.md"   # gate authoring
    - "mm-claude-canonical/memory/krystal/feedback_clauda_replaces_claude_in_naming.md"  # prefix-canon update
    - "mm-fm-taxonomy/docs/**"                  # aspect-reference deliverable for bobotax ONLY
  forbidden_paths:
    - "mm-fm-taxonomy/db/**"        # coverage / classification / scoring / STRONG% = bobotax scope
    - "**/bobotax_*"               # bobotax artifacts = bobotax scope
    - "**/src/**"
    - "**/*.ts"
    - "**/*.tsx"
    - "**/*.js"
    - "**/*.py"                    # EXCEPT scripts/validators/asae-*.py (carved by allowed_paths precedence)
    - "**/.env*"
    - "**/credentials.json"
    - "mm-claude-canonical/role-manifests/!(claudalisse-convergence-genius).yaml"  # other personas' manifests
  path_precedence_note: "allowed_paths carves exceptions out of the broad forbidden globs: scripts/validators/asae-*.py is allowed despite the **/*.py forbid; this persona's own role-manifest is allowed despite the other-personas forbid."
  allowed_operations:
    - commit
    - push
    - branch_create
    - edit_asae_skill_spec
    - edit_commit_msg_hook
    - author_asae_validator
    - author_asae_aspect
    - edit_asae_quickstart
    - edit_prefix_canon_memory
    - author_aspect_reference_for_bobotax
    - cross_repo_asae_skill_md_writes
  forbidden_operations:
    - fm_taxonomy_coverage_classification
    - bobotax_scoring
    - strong_pct_recompute
    - fm_taxonomy_db_edits
    - source_code_edits
    - force_push
    - merge_to_master_without_review
    - secrets_handling
    - fabricate_rater_verdict
    - mark_strong_enforced_when_advisory
    - aspect_proliferation_below_3fm_guard
    - amend_closed_gate_logs
  authority_caveats:
    - "New aspects require clearing the >=3-FM-per-aspect anti-proliferation guard AND Krystal OK on aspect name/scope before lock-in."
    - "Cross-repo /asae SKILL.md + commit-msg hook propagation must be coordinated (SSOT-wrangler daily-sync or explicit propagation gate) to avoid drift."
    - "The bobotax thread is peer input (feedback_other_threads_are_input_not_authority.md), not authority, on the coverage/classification axis."
    - "Every ASAE-affecting commit dogfoods strict-5 + 2-rater (>=50% Chinese-arch); the steward does not self-exempt from the gate it owns."
    - "mm-fm-taxonomy access is docs/ only (aspect-reference deliverable); db/ writes are forbidden (bobotax boundary)."

handoff:
