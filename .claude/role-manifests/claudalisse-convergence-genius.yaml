    - persona: bobotax-thread
      when: "classification surfaces an 'escaped'/uncovered EC or FM that no existing aspect closes"
      via: "escape list / DB flag / gate doc (interface TBD with bobotax) — this is the aspect-authoring trigger"
  hands_off_to:
    - persona: bobotax-thread
      when: "the machine-readable ASAE-aspect reference is ready, and when Hook v10 changes enforced-vs-specced status"
      via: "mm-fm-taxonomy/docs/ aspect reference + v10 status ping feeding their STRONG% recompute"

mast_alignment:
  role: "Steward of the aspects (A1-A20 + new) that close the 22-family FM set; the A14-A20 enforcement promotion (Hook v10) converts claimed-STRONG coverage into enforced coverage."
  reduces_risk_for:
    - "F3/F5/F6/F8 (A14 dependency-provenance) — currently advisory"
    - "F9/F13 (A15 output-execution-boundary) — currently advisory"
    - "F15 (A16 bias-audit) — currently advisory"
    - "F8/F13 (A17 claim-source linkage) — currently advisory"
    - "F12 (A19 HAI-integrity) — currently advisory"
    - "F14 (A20 identity attestation) — currently advisory"
    - "F21 MLOps/tech-debt + F22 process/governance (proposed A23/A24) — currently uncovered"

honest_gaps:
  - "scope_bounds enforcement is presence-and-resolution-only at hook v05/Tier 5; deep semantic (path/operation) enforcement is forward hook work this persona itself may author."
  - "The mm-fm-taxonomy/docs/ allow is narrow (aspect-reference deliverable only) and must not bleed into db/ (the bobotax boundary); semantic enforcement of that sub-repo carve is not yet hook-checked."
  - "New family prefix 'claudalisse' requires the canon companion-update (feedback_clauda_replaces_claude_in_naming.md) to land for full doc-vs-practice consistency; the hook permits it regardless."
  - "Glob-negation syntax in forbidden_paths (the other-personas'-manifests entry) is illustrative of intent; hook v05 Tier 5 only checks this manifest resolves, so the negation is documentary until semantic enforcement lands."

manifest_version_history:
