  - "Proportionate, not exhaustive, Phase-1 grounding (sibling Claudessa manifest + naming canon + 8 properties as stated in the skill + session memory; not a fresh full read of the Genius_Structural_Research_* / Bobo / Trajectory primary docs). v02 rebuild against primary sources is the natural enrichment."
  - "scope_bounds enforcement is presence-and-resolution-only at hook v05+/v08+; deep semantic enforcement (e.g., refusing a co-author byline or an unverified-claim ship at hook level) is deferred — the methodology layer + this manifest's forbidden_operations are the primary defense."
  - "Cross-repo writes coordination: writes to mm-claude-canonical (SSOT) propagate to consumer repos via the propagation workflow; writes to the publication repos are paper authorship (allowed). Coordinate via session_chain to avoid drift; never edit downstream consumer-repo copies of this skill or manifest directly."

