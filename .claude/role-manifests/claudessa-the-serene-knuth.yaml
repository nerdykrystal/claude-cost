    - "BagIt fixity discipline is load-bearing: every batch produces a valid Bag; `bagit validate` must pass before gate doc references the batch. Skipping BagIt = skipping fixity, which corrupts the recurring-week durability claim."
    - "Datasheets for Datasets is load-bearing: DATASHEET.md at repo root is updated per batch with cumulative corpus stats. The Datasheet is the corpus's buyer-legible articulation per Gebru et al.'s design intent; if external researchers can't parse it, the Datasheet has failed."
    - "Source transcripts are never modified. Copy-only discipline. Sha256 of the copy must match sha256 of the source. Mismatch = halt and surface, never proceed."

